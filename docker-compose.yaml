services:
  auth:
    build: ./auth
    container_name: auth_service
    ports:
      - "8001:8000"
    env_file:
      - ./auth/.env
    depends_on:
      auth_db:
        condition: service_healthy
      user:
        condition: service_started

  auth_db:
    image: postgres:15
    container_name: auth_db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user:
    build: ./users
    container_name: user_service
    ports:
      - "8000:8000"
    env_file:
      - ./users/.env
    depends_on:
      user_db:
        condition: service_healthy
  
  user_db:
    image: postgres:15
    container_name: user_db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5