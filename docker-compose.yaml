services:
  auth:
    build: ./auth
    container_name: auth_service
    ports:
      - "8001:8000"
    env_file:
      - ./auth/.env
    depends_on:
      - db
  
  db:
    image: postgres:15
    container_name: auth_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"